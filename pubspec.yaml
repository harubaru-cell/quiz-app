name: personal_quiz_study
description: A personal Flutter Web quiz study app that imports multiple-choice decks from JSON.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.1.7
  intl: ^0.19.0
  provider: ^6.1.2
  shared_preferences: ^2.3.5
  uuid: ^4.5.1
  audioplayers: ^6.8.1
  archive: ^4.0.9
  idb_shim: ^2.9.6+2
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
